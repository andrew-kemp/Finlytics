name: Deploy Static Web App

on:
  push:
    branches:
      - main
    paths:
      - 'StaticWebApp/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy SWA
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: StaticWebApp/package-lock.json

      - name: Install dependencies
        working-directory: StaticWebApp
        run: npm ci

      - name: Build
        working-directory: StaticWebApp
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "StaticWebApp/dist"
          skip_app_build: true
          skip_api_build: true
